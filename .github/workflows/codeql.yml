# For most projects, this workflow file will not need changing; you simply need
# to commit it to your repository.
#
# You may wish to alter this file to override the set of languages analyzed,
# or to provide custom queries or build logic.
#
# ******** NOTE ********
# We have attempted to detect the languages in your repository. Please check
# the `language` matrix defined below to confirm you have the correct set of
# supported CodeQL languages.
#
name: "CodeQL Advanced"

# DELIVERABLES:
# - Fix broken CodeQL workflow by providing valid matrix configuration
# - Enable automated code security scanning on main branch
# - Support JavaScript/TypeScript and Python languages
#
# SUCCESS CRITERIA:
# - Workflow file syntax is valid (no YAML errors at line 45)
# - All matrix variables (language, build-mode) are properly defined
# - CodeQL analysis can execute without missing parameter errors

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '28 5 * * 2'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, python]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3

  CodeQL:
    name: CodeQL
    runs-on: ubuntu-latest
    if: always()
    needs: analyze
    steps:
      - name: Check CodeQL status
        run: |
          if [ "${{ needs.analyze.result }}" = "failure" ]; then
            echo "CodeQL analysis failed"
            exit 1
          elif [ "${{ needs.analyze.result }}" = "skipped" ]; then
            echo "CodeQL analysis was skipped"
            exit 1
          fi
          echo "CodeQL analysis completed successfully"
