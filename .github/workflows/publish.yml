name: Publish to npm

on:
  push:
    branches:
      - main
    tags:
      - "v*"
      - "skill-*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Typecheck
        run: npm run typecheck --if-present

      - name: Build
        run: npm run build

      - name: Prepare package scope for publishing
        run: |
          if [ -z "${NPM_SCOPE}" ]; then
            export NPM_SCOPE=$(npm whoami)
          fi
          echo "Publishing with scope: @${NPM_SCOPE#@}"
          node scripts/prepare-publish-scope.js
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_SCOPE: ${{ vars.NPM_SCOPE }}

      - name: Publish workspaces to npm
        run: npm publish --workspaces --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Release hand-off note
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          echo "Tag publish complete."
          echo "GitHub release is created by .github/workflows/github-release.yml."
